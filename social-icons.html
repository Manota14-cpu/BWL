<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redes Sociales — BWL Studios</title>
    <link rel="stylesheet" href="social-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="social-nav" aria-label="Redes sociales">
      <ul class="social-list" role="list">
        <!-- Sitio Web -->
        <li class="social-item" role="listitem">
          <a
            href="https://manota14-cpu.github.io/BWL/#about"
            class="social-btn social-btn--web"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visitar sitio web"
          >
            <span class="social-tooltip" aria-hidden="true">Sitio Web</span>
            <svg
              class="social-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="12" cy="12" r="9" />
              <ellipse cx="12" cy="12" rx="4" ry="9" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="12" y1="3" x2="12" y2="21" />
            </svg>
          </a>
        </li>

        <!-- LinkedIn -->
        <li class="social-item" role="listitem">
          <a
            href="https://www.linkedin.com/in/joaquin-manota-4326603a6/"
            class="social-btn social-btn--linkedin"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="LinkedIn de Joaquín Manota"
          >
            <span class="social-tooltip" aria-hidden="true">LinkedIn</span>
            <svg
              class="social-icon"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
              />
            </svg>
          </a>
        </li>

        <!-- Instagram -->
        <li class="social-item" role="listitem">
          <a
            href="https://www.instagram.com/joaco.manota/"
            class="social-btn social-btn--instagram"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram de Joaquín Manota"
          >
            <span class="social-tooltip" aria-hidden="true">Instagram</span>
            <svg
              class="social-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
              <circle cx="12" cy="12" r="5" />
              <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
            </svg>
          </a>
        </li>
      </ul>
    </nav>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var items = document.querySelectorAll('.social-item');
        items.forEach(function (item, i) {
          setTimeout(function () {
            item.classList.add('visible');
          }, 100 + i * 150);
        });
      });
    </script>
  </body>
</html>
